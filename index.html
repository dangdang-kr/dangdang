<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>댕댕옷장</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Bootstrap Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    rel="stylesheet"
  />

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --main-black: #111;
      --sub-text: #777;
      --line: #e9e9e9;
      --sale: #ef5a3c;
      --bg-soft: #fafafa;
    }

    * {
      font-family: "Noto Sans KR", sans-serif;
    }

    body {
      background: #fff;
      color: #111;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .site-header {
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .brand {
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .social-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid #ddd;
      background: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: 0.2s ease;
    }

    .social-btn:hover {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .main-nav-wrap {
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .main-nav {
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .main-nav .nav-btn {
      border: 1px solid transparent;
      background: #fff;
      color: #111;
      font-size: 0.95rem;
      padding: 0.65rem 1rem;
      transition: 0.2s ease;
    }

    .main-nav .nav-btn.active,
    .main-nav .nav-btn:hover {
      background: #111;
      color: #fff;
    }

    .hero-section {
      margin-bottom: 5rem;
    }

    .hero-slider {
      position: relative;
    }

    .carousel-item {
      height: 520px;
    }

    .hero-grid {
      height: 520px;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .hero-panel {
      position: relative;
      overflow: hidden;
    }

    .hero-panel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .hero-overlay {
      position: absolute;
      right: 8%;
      top: 50%;
      transform: translateY(-50%);
      color: #fff;
      text-align: right;
      text-shadow: 0 2px 15px rgba(0, 0, 0, 0.18);
    }

    .hero-overlay .hero-kicker {
      display: block;
      font-size: 0.8rem;
      letter-spacing: 0.25em;
      margin-bottom: 0.75rem;
      font-weight: 500;
    }

    .hero-overlay h2 {
      font-size: 3rem;
      line-height: 1.05;
      font-weight: 800;
      margin-bottom: 1rem;
    }

    .hero-overlay p {
      margin: 0;
      font-size: 1rem;
      font-weight: 300;
    }

    .carousel-control-prev,
    .carousel-control-next {
      width: 56px;
      opacity: 1;
    }

    .carousel-control-prev-icon,
    .carousel-control-next-icon {
      background-color: rgba(255, 255, 255, 0.92);
      border-radius: 50%;
      width: 42px;
      height: 42px;
      background-size: 45% 45%;
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.12);
    }

    .section-title-wrap {
      text-align: center;
      margin-bottom: 2rem;
    }

    .section-title {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      margin-bottom: 0.5rem;
    }

    .section-subtitle {
      color: var(--sub-text);
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }

    .category-tabs {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 3rem;
    }

    .category-tabs .tab-btn {
      border: 1px solid #d8d8d8;
      background: #fff;
      color: #111;
      padding: 0.6rem 1.15rem;
      font-size: 0.92rem;
      transition: 0.2s ease;
    }

    .category-tabs .tab-btn.active,
    .category-tabs .tab-btn:hover {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .product-card {
      margin-bottom: 2.3rem;
    }

    .product-thumb {
      position: relative;
      overflow: hidden;
      background: #f5f5f5;
      aspect-ratio: 4 / 5;
      margin-bottom: 0.95rem;
    }

    .product-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.35s ease;
      display: block;
    }

    .product-card:hover .product-thumb img {
      transform: scale(1.04);
    }



    .product-name {
      font-size: 0.98rem;
      font-weight: 500;
      line-height: 1.45;
      margin-bottom: 0.45rem;
      min-height: 2.8em;
    }

    .price-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.45rem;
    }

    .new-price {
      font-size: 1.05rem;
      font-weight: 800;
      color: #111;
    }

    .product-price {
      font-size: 1rem;
      font-weight: 700;
      color: #111;
      margin-bottom: 0.4rem;
    }

    .product-desc {
      color: var(--sub-text);
      font-size: 0.84rem;
      line-height: 1.55;
      min-height: 2.8em;
    }
      margin-top: 2rem;
      padding: 1.25rem 0;
      border-top: 1px solid var(--line);
      font-size: 0.82rem;
      color: #999;
      text-align: center;
    }

    .footer {
      background: #fafafa;
      border-top: 1px solid var(--line);
      margin-top: 4rem;
    }

    .footer p {
      color: #888;
      font-size: 0.88rem;
      margin-bottom: 0;
    }

    @media (max-width: 991.98px) {
      .carousel-item,
      .hero-grid {
        height: auto;
      }

      .hero-grid {
        grid-template-columns: 1fr;
      }

      .hero-panel {
        min-height: 280px;
      }

      .hero-overlay {
        right: 6%;
      }

      .hero-overlay h2 {
        font-size: 2rem;
      }

      .section-title {
        font-size: 1.6rem;
      }
    }

    @media (max-width: 575.98px) {
      .brand {
        font-size: 1.35rem;
      }

      .main-nav .nav-btn,
      .category-tabs .tab-btn {
        font-size: 0.85rem;
        padding: 0.55rem 0.9rem;
      }

      .hero-panel {
        min-height: 230px;
      }

      .hero-overlay h2 {
        font-size: 1.6rem;
      }

      .product-name {
        font-size: 0.92rem;
      }

      .new-price {
        font-size: 0.98rem;
      }
    }
  </style>
</head>
<body>

  <!-- 헤더 -->
  <header class="site-header">
    <div class="container py-3">
      <div class="d-flex align-items-center justify-content-between">


        <div class="brand">
          <a href="https://www.genspark.ai/api/page_private?id=nludvgpu" style="text-decoration: none; color: inherit;">댕댕옷장</a>
       </div>


        <div class="d-flex gap-2">
           <a href="https://www.youtube.com/@dangdangcloset" class="social-btn" target="_blank">
            <i class="bi bi-youtube"></i>
                    </a>  
             <a href="https://www.tiktok.com/@dangdangcloset"   class="social-btn" target="_blank">
             <i class="bi bi-tiktok"></i>
           </a>
           <a href="https://www.instagram.com/dangdangcloset" class="social-btn" target="_blank">
          <i class="bi bi-instagram"></i>
         </a>
        </div>
      </div>
    </div>

    <div class="main-nav-wrap">
      <div class="container">
        <nav class="d-flex justify-content-center py-2 main-nav">
          <button class="nav-btn active" type="button">전체보기</button>
          <button class="nav-btn" type="button">올인원</button>
          <button class="nav-btn" type="button">원피스</button>
          <button class="nav-btn" type="button">패션소품</button>
          <button class="nav-btn" type="button">기타</button>
        </nav>
      </div>
    </div>
  </header>

  <!-- 메인 배너 -->
  <section class="hero-section">
    <div id="heroCarousel" class="carousel slide hero-slider" data-bs-ride="carousel">
      <div class="carousel-indicators">
        <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="0" class="active"></button>
        <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="1"></button>
      </div>

      <div class="carousel-inner">

        <!-- 슬라이드 1 -->
        <div class="carousel-item active">
          <div class="hero-grid">
            <div class="hero-panel">
              <img src="
https://drive.google.com/uc?export=view&id=1Vb6CVf6QxWrB5TEyFPXPDi5boXHMsi2P" alt="메인 배너 왼쪽 이미지">
            </div>
            <div class="hero-panel">
              <img src="images/hero-right-1.jpg" alt="메인 배너 오른쪽 이미지">
              <div class="hero-overlay">
                <span class="hero-kicker">SPRING + SUMMER</span>
                <h2>PRINCESS<br>DRESS</h2>
                <p>우리 댕댕이를 위한 화사한 봄 스타일</p>
              </div>
            </div>
          </div>
        </div>

        <!-- 슬라이드 2 -->
        <div class="carousel-item">
          <div class="hero-grid">
            <div class="hero-panel">
              <img src="images/hero-left-2.jpg" alt="메인 배너 왼쪽 이미지">
            </div>
            <div class="hero-panel">
              <img src="images/hero-right-2.jpg" alt="메인 배너 오른쪽 이미지">
              <div class="hero-overlay">
                <span class="hero-kicker">NEW ARRIVAL</span>
                <h2>COZY<br>OUTER</h2>
                <p>가볍고 따뜻한 데일리 반려견 아우터</p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <button class="carousel-control-prev" type="button" data-bs-target="#heroCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
      </button>

      <button class="carousel-control-next" type="button" data-bs-target="#heroCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
      </button>
    </div>
  </section>

  <!-- BEST 상품 -->
  <section class="best-section pb-5">
    <div class="container">
      <div class="section-title-wrap">
        <h2 class="section-title">BEST</h2>
        <p class="section-subtitle">가장 인기 있는 댕댕 아이템</p>

        <div class="category-tabs">
          <button class="tab-btn active" data-filter="all" type="button">전체보기</button>
          <button class="tab-btn" data-filter="올인원" type="button">올인원</button>
          <button class="tab-btn" data-filter="원피스" type="button">원피스</button>
          <button class="tab-btn" data-filter="패션소품" type="button">패션소품</button>
          <button class="tab-btn" data-filter="기타" type="button">기타</button>
        </div>
      </div>

      <div class="row g-4 g-lg-5" id="productGrid"></div>

      <div class="notice-bar">
        이 사이트는 제품 미리보기 형식으로 구성되어 있으며, 링크 연결 없이 디자인 예시로 제작되었습니다.
      </div>
    </div>
  </section>

  <footer class="footer py-4">
    <div class="container text-center">
      <p>© 2026 댕댕옷장. All Rights Reserved.</p>
    </div>
  </footer>

  <script>
    const products = [
      {
        category: "원피스",
        image: "images/product-1.jpg",
        name: "클로셋 체크 코트 [S(44~55), FREE(66~77)]",
        price: "49,800원",
        desc: "클래식한 체크 패턴으로 세련된 무드를 더해주는 강아지 아우터."
      },
      {
        category: "원피스",
        image: "images/product-2.jpg",
        name: "볼륨 니트 원피스",
        price: "29,700원",
        desc: "러블리한 실루엣이 돋보이는 부드러운 니트 원피스."
      },
      {
        category: "패션소품",
        image: "images/product-3.jpg",
        name: "나인텍 롱다리 자켓",
        price: "39,900원",
        desc: "데일리로 입히기 좋은 캐주얼 무드의 아우터 스타일."
      },
      {
        category: "기타",
        image: "images/product-4.jpg",
        name: "대디포트 후드 니트 손뜨개",
        price: "29,900원",
        desc: "따뜻한 짜임과 포근한 분위기가 살아있는 니트웨어."
      },
      {
        category: "원피스",
        image: "images/product-5.jpg",
        name: "핑크 플로럴 프린세스 원피스",
        price: "24,500원",
        desc: "화사한 꽃무늬와 풍성한 프릴이 매력적인 프린세스 드레스."
      },
      {
        category: "원피스",
        image: "images/product-6.jpg",
        name: "여름 플릴 미니 원피스",
        price: "19,600원",
        desc: "산뜻한 컬러감과 튤 디테일이 돋보이는 여름 원피스."
      },
      {
        category: "패션소품",
        image: "images/product-7.jpg",
        name: "강아지 나비넥타이 + 모자 세트",
        price: "14,400원",
        desc: "촬영 소품으로도 좋은 귀여운 포멀 스타일 액세서리 세트."
      },
      {
        category: "기타",
        image: "images/product-8.jpg",
        name: "벨벳 리본 목걸이",
        price: "9,600원",
        desc: "간단하게 착용해도 포인트가 되는 고급스러운 리본 목걸이."
      }
    ];

    const productGrid = document.getElementById("productGrid");

    function renderProducts(filter = "all") {
      productGrid.innerHTML = "";

      const filteredProducts = filter === "all"
        ? products
        : products.filter(item => item.category === filter);

      filteredProducts.forEach(product => {
        const col = document.createElement("div");
        col.className = "col-6 col-md-4 col-lg-3";

        col.innerHTML = `
          <div class="product-card">
            <div class="product-thumb">
              <img src="${product.image}" alt="${product.name}">
            </div>
            <div class="product-name">${product.name}</div>
            ${product.price ? `<div class="product-price">${product.price}</div>` : ''}
            <div class="product-desc">${product.desc}</div>
          </div>
        `;

        productGrid.appendChild(col);
      });
    }

    renderProducts();

    const tabButtons = document.querySelectorAll(".tab-btn");
    tabButtons.forEach(btn => {
      btn.addEventListener("click", function () {
        tabButtons.forEach(tab => tab.classList.remove("active"));
        this.classList.add("active");
        renderProducts(this.dataset.filter);
      });
    });
  </script>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>
</body>
</html>
